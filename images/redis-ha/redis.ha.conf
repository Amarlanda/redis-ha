# redis.ha.conf — base config fragment shared by primary + standby.
# Role-specific bits (replicaof, requirepass, masterauth, dir) are
# appended by entrypoint-ha.sh per role/env, then the merged file is
# passed to redis-server.
#
# Notes:
#   - bind 0.0.0.0 because each container is on the macvlan and gets
#     its own routable IP. Auth (requirepass) is the access control,
#     not bind.
#   - protected-mode no because we ARE listening on the macvlan, but
#     requirepass is enforced — protected-mode would refuse external
#     connections even with auth, which defeats the HA model.
#   - appendonly yes for crash-safe persistence between restarts. RDB
#     also kept (default) for fast warm-start.
#   - tcp-keepalive 60 so dead client sockets get reaped within a
#     minute (matters when the primary's container is bounced and
#     standbys hold stale connections).
#   - replica-read-only yes — standbys reject writes. Apps that talk
#     to the standby explicitly (e.g. analytics) get a clear error
#     instead of writing to a soon-to-be-discarded local copy.

bind 0.0.0.0
protected-mode no
port 6379
appendonly yes
appendfsync everysec
tcp-keepalive 60
replica-read-only yes
loglevel notice
